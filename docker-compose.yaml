services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: payout
      POSTGRES_PASSWORD: payout
      POSTGRES_DB: payout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payout"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    profiles: [server]
    build: .
    environment:
      DATABASE_URL: "postgres://payout:payout@postgres:5432/payout?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
